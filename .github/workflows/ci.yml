name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: macos-26

    env:
      XCODEGEN_VERSION: "2.45.3"
      SWIFTFORMAT_VERSION: "0.61.1"
      SWIFTLINT_VERSION: "0.63.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: '26.4.1'

      - name: Install tooling
        run: |
          mkdir -p "$RUNNER_TEMP/bin"

          XCODEGEN_TEMP_DIR="$(mktemp -d)"
          curl -fsSL -o "$XCODEGEN_TEMP_DIR/xcodegen.zip" "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -qo "$XCODEGEN_TEMP_DIR/xcodegen.zip" -d "$XCODEGEN_TEMP_DIR"
          # The release zip may add a top-level directory, so resolve the binary dynamically.
          XCODEGEN_PATH="$(find "$XCODEGEN_TEMP_DIR" -type f -path '*/bin/xcodegen' -print -quit)"
          install -m 0755 "$XCODEGEN_PATH" "$RUNNER_TEMP/bin/xcodegen"

          curl -fsSL -o /tmp/swiftformat.zip "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -qo /tmp/swiftformat.zip -d /tmp/swiftformat
          install -m 0755 /tmp/swiftformat/swiftformat "$RUNNER_TEMP/bin/swiftformat"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

          curl -fsSL -o /tmp/SwiftLint.pkg "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/SwiftLint.pkg"
          sudo installer -pkg /tmp/SwiftLint.pkg -target /

      - name: Show tool versions
        run: |
          xcodegen --version
          swiftformat --version
          swiftlint version

      - name: Verify formatting
        run: ./Scripts/format.sh --check

      - name: Run lint
        run: ./Scripts/lint.sh

  test:
    name: Test
    runs-on: macos-26

    env:
      XCODEGEN_VERSION: "2.45.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: '26.4.1'

      - name: Install XcodeGen
        run: |
          mkdir -p "$RUNNER_TEMP/bin"

          XCODEGEN_TEMP_DIR="$(mktemp -d)"
          curl -fsSL -o "$XCODEGEN_TEMP_DIR/xcodegen.zip" "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -qo "$XCODEGEN_TEMP_DIR/xcodegen.zip" -d "$XCODEGEN_TEMP_DIR"
          # The release zip may add a top-level directory, so resolve the binary dynamically.
          XCODEGEN_PATH="$(find "$XCODEGEN_TEMP_DIR" -type f -path '*/bin/xcodegen' -print -quit)"
          install -m 0755 "$XCODEGEN_PATH" "$RUNNER_TEMP/bin/xcodegen"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: ./Scripts/test.sh

      - name: Generate Xcode project
        run: ./Scripts/generate_xcodeproj.sh

      - name: Build iOS and macOS apps
        run: ./Scripts/build_apps.sh
