name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: macos-26

    env:
      SWIFTFORMAT_VERSION: "0.55.5"
      SWIFTLINT_VERSION: "0.58.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Install tooling
        run: |
          curl -fsSL -o /tmp/swiftformat.zip "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -qo /tmp/swiftformat.zip -d /tmp/swiftformat
          install -m 0755 /tmp/swiftformat/swiftformat /usr/local/bin/swiftformat

          curl -fsSL -o /tmp/SwiftLint.pkg "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/SwiftLint.pkg"
          sudo installer -pkg /tmp/SwiftLint.pkg -target /

      - name: Show tool versions
        run: |
          swiftformat --version
          swiftlint version

      - name: Verify formatting
        run: ./Scripts/format.sh --check

      - name: Run lint
        run: ./Scripts/lint.sh

  test:
    name: Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Run tests
        run: ./Scripts/test.sh
