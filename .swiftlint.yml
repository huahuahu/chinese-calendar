included:
  - Sources
  - Tests
  - Apps

excluded:
  - .build
  - Sources/.build
  - Packages
  - Data

analyzer_rules:
  - unused_import

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - modifier_order
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - vertical_parameter_alignment_on_call

disabled_rules:
  - todo

type_name:
  min_length:
    warning: 1
  max_length:
    warning: 40
    error: 60

line_length:
  warning: 120
  error: 140
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 250
  error: 350

function_body_length:
  warning: 50
  error: 80

file_length:
  warning: 500
  error: 800

identifier_name:
  validates_start_with_lowercase: false
  min_length:
    warning: 1
  excluded:
    - id
    - x
    - y

reporter: "xcode"
